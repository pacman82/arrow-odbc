name: Release-plz

on:
    push:
        branches:
            - main

jobs:
    # Release unpublished packages.
    release-plz-release:
        name: Release-plz release
        runs-on: ubuntu-latest
        permissions:
            # Allow setting tags
            contents: write
            pull-requests: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  # Fetch the complete history in order to detect previous releases.
                  fetch-depth: 0
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
            - name: Run release-plz
              uses: MarcoIeni/release-plz-action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5
              with:
                  command: release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

    # Create a PR with the new versions and changelog, preparing the next release.
    release-plz-pr:
        name: Release-plz PR
        runs-on: ubuntu-latest
        permissions:
            # Write changelog, change version in Cargo.toml
            contents: write
            # Create PR
            pull-requests: write
        concurrency:
            group: release-plz-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - name: Checkout repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  # Fetch the complete history for changelog generation.
                  fetch-depth: 0
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
            - name: Run release-plz
              uses: MarcoIeni/release-plz-action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5
              with:
                  command: release-pr
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
